<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#ffffff"/>

  <!-- Gradient Background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#005C97;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#363795;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#005C97" />
      <stop offset="100%" style="stop-color:#363795" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#gradient)"/>

  <!-- Main Title -->
  <text x="600" y="280"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="96"
        font-weight="700"
        text-anchor="middle"
        fill="url(#textGradient)">
    FigTracker
  </text>

  <!-- Subtitle -->
  <text x="600" y="360"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="36"
        font-weight="400"
        text-anchor="middle"
        fill="#171717">
    LEGO Minifigure Price Tracker
  </text>

  <!-- Feature Text -->
  <text x="600" y="440"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="28"
        font-weight="400"
        text-anchor="middle"
        fill="#737373">
    Real-time Bricklink prices • Track your collection
  </text>

  <!-- URL -->
  <text x="600" y="530"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="24"
        font-weight="500"
        text-anchor="middle"
        fill="#005C97">
    figtracker.ericksu.com
  </text>
</svg>
