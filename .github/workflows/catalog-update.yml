name: Catalog Update Reminder

on:
  schedule:
    # Run every 2 weeks on 1st and 15th of month at 9 AM PST (5 PM UTC)
    - cron: '0 17 1,15 * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  create-reminder:
    runs-on: ubuntu-latest

    steps:
      - name: Create reminder issue
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔔 Catalog Update Reminder - ${date}`,
              body: `## Time to update BrickLink catalogs!

            ### Steps:

            1. **Download catalogs from BrickLink:**
               - Go to: https://www.bricklink.com/catalogDownload.asp
               - Download **Minifigures** → Save as \`Minifigures.txt\`
               - Download **Sets** → Save as \`Sets.txt\`

            2. **Place files in project:**
               \`\`\`bash
               # Put downloaded files here:
               public/catalog/updates/Minifigures.txt
               public/catalog/updates/Sets.txt
               \`\`\`

            3. **Run update script:**
               \`\`\`bash
               npm run update-catalog
               \`\`\`

            4. **Review and commit:**
               - Check that minifigs.json and sets.json were updated
               - Review any item number migrations in console output
               - Commit and push changes

            5. **Close this issue** when complete

            ---

            ### What the script does:
            - ✅ Converts TXT files to JSON
            - ✅ Detects item number changes (e.g., sw1234 → sw1234a)
            - ✅ Migrates your database automatically
            - ✅ Updates user collections with new IDs

            ### Notes:
            - If no new sets/minifigs were released, you can skip this update
            - Check LEGO/BrickLink news to see if item numbers changed recently
            - Next reminder: 2 weeks from today`,
              labels: ['reminder', 'catalog-update']
            });
            console.log(\`Created reminder issue #\${issue.data.number}\`);
